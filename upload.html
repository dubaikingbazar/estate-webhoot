<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Photos Upload</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f8fafc;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 28px 20px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
h2 {
  font-size: 18px;
  font-weight: 700;
  color: #1e293b;
  margin-bottom: 6px;
}
.sub {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 20px;
}
.upload-zone {
  border: 2px dashed #cbd5e1;
  border-radius: 12px;
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  position: relative;
  margin-bottom: 16px;
  transition: all 0.2s;
}
.upload-zone:hover { border-color: #1e3a5f; background: #f8fafc; }
.upload-zone input {
  position: absolute; inset: 0; opacity: 0;
  cursor: pointer; width: 100%; height: 100%;
}
.upload-zone svg { margin-bottom: 8px; }
.upload-zone p { font-size: 13px; color: #64748b; }
.preview-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.preview-item {
  aspect-ratio: 1;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  border: 1px solid #e2e8f0;
}
.preview-item img { width: 100%; height: 100%; object-fit: cover; }
.preview-item .del {
  position: absolute; top: 3px; right: 3px;
  background: rgba(239,68,68,0.9); color: #fff;
  border: none; border-radius: 50%;
  width: 20px; height: 20px;
  font-size: 12px; cursor: pointer; font-weight: 700;
}
.btn {
  width: 100%;
  background: #1e3a5f;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: none;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { text-align: center; padding: 10px; font-size: 13px; border-radius: 8px; margin-top: 12px; display: none; }
.msg.success { background: #dcfce7; color: #16a34a; }
.msg.error { background: #fee2e2; color: #dc2626; }
.count { font-size: 11px; color: #94a3b8; text-align: center; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="card">
  <h2>📸 Property Photos</h2>
  <p class="sub">Apni property ki photos upload karein — jaldi buyer milega!</p>

  <div class="upload-zone" id="zone">
    <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)"/>
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21,15 16,10 5,21"/>
    </svg>
    <p>Photos select karein<br><small style="color:#cbd5e1;">JPG, PNG · Max 5</small></p>
  </div>

  <div class="count" id="count" style="display:none;"></div>
  <div class="preview-grid" id="preview"></div>
  <button class="btn" id="submitBtn" onclick="uploadAll()">Photos Upload Karein</button>
  <div class="msg success" id="successMsg">✅ Photos upload ho gayi! Agent se jald contact hoga.</div>
  <div class="msg error" id="errorMsg">Upload fail ho gaya. Dobara try karein.</div>
</div>

<script>
const token = window.location.pathname.split('/').pop();
let files = [];

const zone = document.getElementById('zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor='#1e3a5f'; });
zone.addEventListener('dragleave', () => zone.style.borderColor='#cbd5e1');
zone.addEventListener('drop', e => { e.preventDefault(); zone.style.borderColor='#cbd5e1'; handleFiles(e.dataTransfer.files); });

function handleFiles(f) {
  files = [...files, ...Array.from(f)].slice(0, 5);
  render();
}

function render() {
  const p = document.getElementById('preview');
  const c = document.getElementById('count');
  const btn = document.getElementById('submitBtn');
  p.innerHTML = '';
  if (!files.length) { c.style.display='none'; btn.style.display='none'; return; }
  c.style.display='block'; c.textContent = files.length + ' photo(s) selected';
  btn.style.display='block';
  files.forEach((f, i) => {
    const r = new FileReader();
    r.onload = e => {
      const d = document.createElement('div');
      d.className = 'preview-item';
      d.innerHTML = '<img src="'+e.target.result+'"/><button class="del" onclick="remove('+i+')">×</button>';
      p.appendChild(d);
    };
    r.readAsDataURL(f);
  });
}

function remove(i) { files.splice(i,1); render(); }

async function uploadAll() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Upload ho raha hai...';
  try {
    for (const file of files) {
      const r = await fetch('/api/upload-image/'+token, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({fileName:file.name, fileType:file.type})
      });
      const {signedUrl} = await r.json();
      await fetch(signedUrl, {method:'PUT', headers:{'Content-Type':file.type}, body:file});
    }
    document.getElementById('successMsg').style.display='block';
    document.getElementById('zone').style.display='none';
    document.getElementById('preview').style.display='none';
    document.getElementById('count').style.display='none';
    btn.style.display='none';
  } catch(e) {
    document.getElementById('errorMsg').style.display='block';
    btn.disabled=false; btn.textContent='Photos Upload Karein';
  }
}
</script>
</body>
</html>
